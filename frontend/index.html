
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMatch — Smart Job Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Variables ─────────────────────────────────────────────────── */
    :root {
      --bg:        #0c0e14;
      --bg2:       #12151e;
      --bg3:       #1a1f2e;
      --border:    #252a3a;
      --border2:   #2e3550;
      --accent:    #5b8def;
      --accent2:   #7b5ea7;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --text:      #e8ecf4;
      --muted:     #8892a4;
      --card:      rgba(26, 31, 46, 0.8);
      --radius:    14px;
      --shadow:    0 4px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(91,141,239,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(123,94,167,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #root { position: relative; z-index: 1; }

    /* ─── Nav ───────────────────────────────────────────────────────────── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(12,14,20,0.9);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #5b8def, #7b5ea7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-user {
      font-size: 0.85rem; color: var(--muted);
      padding: 6px 14px;
      border: 1px solid var(--border2);
      border-radius: 20px;
    }

    /* ─── Buttons ───────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; font-size: 0.9rem;
      font-weight: 500; border: none; cursor: pointer;
      transition: all 0.2s; text-decoration: none; font-family: 'DM Sans', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5b8def, #7b5ea7);
      color: white;
      box-shadow: 0 2px 20px rgba(91,141,239,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 25px rgba(91,141,239,0.45); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,141,239,0.06); }
    .btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; border-radius: 8px; }
    .btn-success { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }

    /* ─── Layout ────────────────────────────────────────────────────────── */
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .page-sm { max-width: 520px; margin: 0 auto; padding: 60px 24px; }

    /* ─── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      backdrop-filter: blur(10px);
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem; font-weight: 600;
      margin-bottom: 18px; color: var(--text);
    }

    /* ─── Forms ─────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.03em; }
    input, select, textarea {
      width: 100%; padding: 11px 14px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text); font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,141,239,0.12);
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--bg3); }

    /* ─── Score Badge ────────────────────────────────────────────────────── */
    .score-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 58px; height: 58px; border-radius: 50%;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      flex-shrink: 0;
    }
    .score-high  { background: rgba(52,211,153,0.15);  color: var(--green);  border: 2px solid rgba(52,211,153,0.4); }
    .score-mid   { background: rgba(251,191,36,0.12);  color: var(--yellow); border: 2px solid rgba(251,191,36,0.3); }
    .score-low   { background: rgba(248,113,113,0.12); color: var(--red);    border: 2px solid rgba(248,113,113,0.3); }

    /* ─── Progress Bar ───────────────────────────────────────────────────── */
    .progress-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 10px; }
    .progress-fill  { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
    .fill-high  { background: linear-gradient(90deg, #34d399, #10b981); }
    .fill-mid   { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .fill-low   { background: linear-gradient(90deg, #f87171, #ef4444); }

    /* ─── Skill Pills ────────────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
      margin: 3px;
    }
    .pill-green  { background: rgba(52,211,153,0.1);  color: var(--green);  border: 1px solid rgba(52,211,153,0.25); }
    .pill-red    { background: rgba(248,113,113,0.1); color: var(--red);    border: 1px solid rgba(248,113,113,0.25); }
    .pill-blue   { background: rgba(91,141,239,0.1);  color: var(--accent); border: 1px solid rgba(91,141,239,0.25); }
    .pill-gray   { background: rgba(136,146,164,0.1); color: var(--muted);  border: 1px solid var(--border2); }

    /* ─── Job Card ───────────────────────────────────────────────────────── */
    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      margin-bottom: 14px;
      cursor: pointer;
    }
    .job-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,0.3); transform: translateY(-1px); }
    .job-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .job-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); }
    .job-meta { color: var(--muted); font-size: 0.83rem; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .job-meta span { display: flex; align-items: center; gap: 4px; }
    .job-type-badge {
      display: inline-block; padding: 2px 9px; border-radius: 6px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .type-full_time  { background: rgba(91,141,239,0.15); color: var(--accent); }
    .type-internship { background: rgba(123,94,167,0.15); color: #a78bfa; }
    .type-remote     { background: rgba(52,211,153,0.12); color: var(--green); }
    .type-part_time  { background: rgba(251,191,36,0.12); color: var(--yellow); }

    /* ─── Tabs ───────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab {
      padding: 10px 20px; font-size: 0.88rem; font-weight: 500;
      color: var(--muted); border: none; background: transparent;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; margin-bottom: -1px; font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }

    /* ─── Alert ─────────────────────────────────────────────────────────── */
    .alert {
      padding: 12px 16px; border-radius: 10px; font-size: 0.88rem;
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }
    .alert-error   { background: rgba(248,113,113,0.1); color: var(--red);   border: 1px solid rgba(248,113,113,0.25); }
    .alert-success { background: rgba(52,211,153,0.1);  color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
    .alert-info    { background: rgba(91,141,239,0.1);  color: var(--accent); border: 1px solid rgba(91,141,239,0.25); }

    /* ─── Upload zone ────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border2); border-radius: 12px;
      padding: 40px; text-align: center; transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(91,141,239,0.04); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-text { color: var(--muted); font-size: 0.9rem; }

    /* ─── Stats row ──────────────────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ─── Grid ───────────────────────────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ─── Loading ────────────────────────────────────────────────────────── */
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-center { display: flex; justify-content: center; padding: 60px; }

    /* ─── Skill autocomplete ─────────────────────────────────────────────── */
    .autocomplete-box {
      position: absolute; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; z-index: 50; max-height: 200px; overflow-y: auto;
      width: 100%; margin-top: 4px; box-shadow: var(--shadow);
    }
    .autocomplete-item {
      padding: 9px 14px; cursor: pointer; font-size: 0.88rem; transition: background 0.1s;
    }
    .autocomplete-item:hover { background: var(--bg2); color: var(--accent); }
    .relative { position: relative; }

    /* ─── Modal ──────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; backdrop-filter: blur(4px);
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 18px; padding: 28px; max-width: 620px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      animation: slideUp 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { transform: translateY(16px); opacity:0 } to { transform: translateY(0); opacity:1 } }

    /* ─── Hero ───────────────────────────────────────────────────────────── */
    .hero { text-align: center; padding: 80px 24px 60px; }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 700;
      line-height: 1.15; margin-bottom: 20px;
    }
    .gradient-text {
      background: linear-gradient(135deg, #5b8def 0%, #7b5ea7 50%, #34d399 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { font-size: 1.1rem; color: var(--muted); max-width: 520px; margin: 0 auto 36px; line-height: 1.7; }
    .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    /* ─── Code mono ──────────────────────────────────────────────────────── */
    code { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

    h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 0.83rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 8px; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .w-full { width: 100%; }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'http://127.0.0.1:8000'; // Change to your deployed backend URL

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  token: localStorage.getItem('token'),
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  page: 'home',
  prevPage: null,
};

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function navigate(page) {
  state.prevPage = state.page;
  state.page = page;
  render();
}

// ─── API HELPERS ─────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

async function apiForm(path, formData) {
  const headers = {};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(API + path, { method: 'POST', headers, body: formData });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function scoreClass(s) { return s >= 60 ? 'high' : s >= 30 ? 'mid' : 'low'; }
function scoreColor(s) { return s >= 60 ? 'var(--green)' : s >= 30 ? 'var(--yellow)' : 'var(--red)'; }
function formatSalary(min, max) {
  if (!min && !max) return 'Salary not specified';
  const fmt = n => n >= 1000 ? `$${(n/1000).toFixed(0)}k` : `$${n}`;
  if (min && max) return `${fmt(min)} – ${fmt(max)}`;
  return min ? `From ${fmt(min)}` : `Up to ${fmt(max)}`;
}
function jobTypeLabel(t) {
  return { full_time: 'Full Time', part_time: 'Part Time', internship: 'Internship', remote: 'Remote' }[t] || t;
}

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function Nav() {
  return `
    <nav class="nav">
      <a href="#" class="nav-logo" onclick="navigate('home');return false">⚡ SkillMatch</a>
      <div class="nav-links">
        ${state.token ? `
          <button class="btn btn-ghost btn-sm" onclick="navigate('dashboard')">Dashboard</button>
          <button class="btn btn-ghost btn-sm" onclick="navigate('jobs')">Browse Jobs</button>
          <button class="btn btn-ghost btn-sm" onclick="navigate('profile')">Profile</button>
          <span class="nav-user">👤 ${state.user?.full_name || 'User'}</span>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
        ` : `
          <button class="btn btn-ghost btn-sm" onclick="navigate('login')">Login</button>
          <button class="btn btn-primary btn-sm" onclick="navigate('register')">Get Started</button>
        `}
      </div>
    </nav>`;
}

// ─── AUTH PAGES ───────────────────────────────────────────────────────────────
function LoginPage() {
  return `
    <div class="page-sm">
      <div class="card" style="margin-top:40px">
        <h2 style="margin-bottom:6px">Welcome back</h2>
        <p class="text-muted text-sm" style="margin-bottom:24px">Sign in to see your job recommendations</p>
        <div id="auth-error"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary w-full" id="login-btn" onclick="doLogin()" style="width:100%;justify-content:center">
          Sign In
        </button>
        <p class="text-muted text-sm" style="text-align:center;margin-top:16px">
          Don't have an account? <a href="#" onclick="navigate('register');return false" style="color:var(--accent)">Register</a>
        </p>
      </div>
    </div>`;
}

function RegisterPage() {
  return `
    <div class="page-sm">
      <div class="card" style="margin-top:40px">
        <h2 style="margin-bottom:6px">Create your account</h2>
        <p class="text-muted text-sm" style="margin-bottom:24px">Start getting matched with your ideal jobs</p>
        <div id="auth-error"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="At least 8 characters" />
        </div>
        <button class="btn btn-primary" onclick="doRegister()" style="width:100%;justify-content:center">
          Create Account
        </button>
        <p class="text-muted text-sm" style="text-align:center;margin-top:16px">
          Already have an account? <a href="#" onclick="navigate('login');return false" style="color:var(--accent)">Login</a>
        </p>
      </div>
    </div>`;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage() {
  return `
    <div class="page">
      <div style="margin-bottom:28px">
        <h2 style="font-size:1.6rem">Hi, ${state.user?.full_name?.split(' ')[0]} 👋</h2>
        <p class="text-muted">Here are your personalized job recommendations</p>
      </div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-value" id="st-jobs">—</div><div class="stat-label">Jobs Analyzed</div></div>
        <div class="stat-card"><div class="stat-value" id="st-skills">—</div><div class="stat-label">Your Skills</div></div>
        <div class="stat-card"><div class="stat-value" id="st-top">—</div><div class="stat-label">Top Match %</div></div>
        <div class="stat-card"><div class="stat-value" id="st-ready">—</div><div class="stat-label">Jobs ≥ 60%</div></div>
      </div>
      <div id="rec-container">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>`;
}

function renderRecommendations(data) {
  document.getElementById('st-jobs').textContent = data.total_jobs_analyzed;
  document.getElementById('st-skills').textContent = data.user_skills.length;
  const scores = data.recommendations.map(r => r.match_score);
  document.getElementById('st-top').textContent = scores.length ? `${Math.max(...scores)}%` : '0%';
  document.getElementById('st-ready').textContent = scores.filter(s => s >= 60).length;

  if (!data.recommendations.length) {
    document.getElementById('rec-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No recommendations yet</h3>
        <p>Add your skills to your profile first, then come back here.</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="navigate('profile')">Add Skills</button>
      </div>`;
    return;
  }

  document.getElementById('rec-container').innerHTML = `
    <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
      <h3 style="font-family:'Space Grotesk',sans-serif">Recommended Jobs</h3>
      <span class="text-muted text-sm">${data.recommendations.length} matches found</span>
    </div>
    ${data.recommendations.map(job => JobCard(job)).join('')}`;
}

function JobCard(job) {
  const sc = scoreClass(job.match_score);
  const fillClass = `fill-${sc}`;
  return `
    <div class="job-card" onclick="openJobModal(${job.job_id})">
      <div class="job-card-header">
        <div>
          <div class="job-title">${job.title}</div>
          <div class="job-meta">
            <span>🏢 ${job.company}</span>
            ${job.location ? `<span>📍 ${job.location}</span>` : ''}
            <span>💰 ${formatSalary(job.salary_min, job.salary_max)}</span>
            <span class="job-type-badge type-${job.job_type}">${jobTypeLabel(job.job_type)}</span>
          </div>
        </div>
        <div class="score-badge score-${sc}">${job.match_score}%</div>
      </div>
      <div class="progress-track"><div class="progress-fill ${fillClass}" style="width:${job.match_score}%"></div></div>
      <div style="margin-top:14px;display:flex;gap:16px;flex-wrap:wrap">
        <div>
          <div class="text-muted text-sm" style="margin-bottom:4px">✅ You have (${job.matched_skills.length})</div>
          <div>${job.matched_skills.slice(0,5).map(s => `<span class="pill pill-green">${s}</span>`).join('')}
               ${job.matched_skills.length > 5 ? `<span class="pill pill-gray">+${job.matched_skills.length-5}</span>` : ''}</div>
        </div>
        ${job.missing_skills.length ? `
        <div>
          <div class="text-muted text-sm" style="margin-bottom:4px">❌ Missing (${job.missing_skills.length})</div>
          <div>${job.missing_skills.slice(0,4).map(s => `<span class="pill pill-red">${s}</span>`).join('')}
               ${job.missing_skills.length > 4 ? `<span class="pill pill-gray">+${job.missing_skills.length-4}</span>` : ''}</div>
        </div>` : '<div><span class="pill pill-green">✨ Perfect match!</span></div>'}
      </div>
    </div>`;
}

function SkillsTab(userSkills, allSkills) {
  return `
    <div class="grid-2">
      <div>
        <div class="card">

            return `
              <div style="margin-bottom:12px">
                <div class="text-muted text-sm" style="margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em">${cat}</div>

// ─── JOB DETAIL MODAL ─────────────────────────────────────────────────────────
let currentJobDetail = null;
async function openJobModal(jobId) {
  // Show loading modal
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="job-modal">
      <div class="modal"><div class="loading-center"><div class="spinner"></div></div></div>
    </div>`);

  try {
    const data = await api(`/recommend/gap/${jobId}`);
    const sc = scoreClass(data.match_score);
    document.getElementById('job-modal').innerHTML = `
      <div class="modal-overlay" id="job-modal" onclick="closeJobModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
            <div>
              <h2 style="font-size:1.3rem">${data.job.title}</h2>
              <div class="job-meta" style="margin-top:6px">
                <span>🏢 ${data.job.company}</span>
                ${data.job.location ? `<span>📍 ${data.job.location}</span>` : ''}
                <span>💰 ${formatSalary(data.job.salary_min, data.job.salary_max)}</span>
              </div>
            </div>
            <div style="text-align:center">
              <div class="score-badge score-${sc}">${data.match_score}%</div>
              <div class="text-muted text-sm" style="margin-top:4px">Match</div>
            </div>
          </div>
          <div class="progress-track" style="margin-bottom:20px"><div class="progress-fill fill-${sc}" style="width:${data.match_score}%"></div></div>
          ${data.job.description ? `<p class="text-muted text-sm" style="margin-bottom:20px;line-height:1.6">${data.job.description}</p>` : ''}
          <div class="divider"></div>
          <h4 style="font-family:'Space Grotesk',sans-serif;margin:16px 0 10px">✅ Skills You Have</h4>
          <div>${data.matched_skills.map(s => `<span class="pill pill-green">${s}</span>`).join('') || '<span class="text-muted text-sm">None matched yet</span>'}</div>
          ${data.missing_required_skills.length ? `
            <h4 style="font-family:'Space Grotesk',sans-serif;margin:20px 0 10px">❌ Skills to Learn</h4>
            ${data.missing_required_skills.map(item => `
              <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px">
                <div style="font-weight:600;margin-bottom:8px">${item.skill}</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                  ${item.resources.map(r => `
                    <a href="${r.url}" target="_blank" class="btn btn-ghost btn-sm">
                      ${r.is_free ? '🆓' : '💳'} ${r.platform}
                    </a>`).join('')}
                </div>
              </div>`).join('')}` : ''}
          <div class="divider"></div>
          <button class="btn btn-ghost" onclick="document.getElementById('job-modal').remove()" style="margin-top:12px">Close</button>
        </div>
      </div>`;
  } catch (e) {
    document.getElementById('job-modal').remove();
  }
}
function closeJobModal(e) {
  if (e.target.id === 'job-modal') document.getElementById('job-modal').remove();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('auth-error');
  try {
    const data = await api('/auth/login', {
      method: 'POST', body: JSON.stringify({ email, password })
    });
    state.token = data.access_token;
    state.user = { id: data.user_id, full_name: data.full_name };
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(state.user));
    navigate('dashboard');
  } catch (e) {
    errEl.innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`;
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const full_name = document.getElementById('reg-name').value;
  const errEl = document.getElementById('auth-error');
  try {
    const data = await api('/auth/register', {
      method: 'POST', body: JSON.stringify({ email, password, full_name })
    });
    state.token = data.access_token;
    state.user = { id: data.user_id, full_name: data.full_name };
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(state.user));
    navigate('profile');
  } catch (e) {
    errEl.innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`;
  }
}

function logout() {
  state.token = null; state.user = null;
  localStorage.removeItem('token'); localStorage.removeItem('user');
  navigate('home');
}

// Skills
let allSkillsCache = [];
async function loadAllSkills() {
  if (!allSkillsCache.length) allSkillsCache = await api('/skills');
  return allSkillsCache;
}

function filterSkills() {
  const q = document.getElementById('skill-search').value.toLowerCase();
  const ac = document.getElementById('skill-ac');
  if (!q || q.length < 1) { ac.style.display = 'none'; return; }
  const filtered = allSkillsCache.filter(s => s.name.toLowerCase().includes(q)).slice(0, 8);
  if (!filtered.length) { ac.style.display = 'none'; return; }
  ac.style.display = 'block';
  ac.innerHTML = filtered.map(s => `
    <div class="autocomplete-item" onclick="selectSkill(${s.id}, '${s.name}')">
      ${s.name} <span style="color:var(--muted);font-size:0.75rem">${s.category}</span>
    </div>`).join('');
}

function selectSkill(id, name) {
  document.getElementById('selected-skill-id').value = id;
  document.getElementById('skill-search').value = name;
  document.getElementById('skill-ac').style.display = 'none';
}

function quickAddSkill(id, name) {
  document.getElementById('selected-skill-id').value = id;
  document.getElementById('skill-search').value = name;
  addSkill();
}

async function addSkill() {
  const skill_id = document.getElementById('selected-skill-id').value;
  const proficiency = document.getElementById('skill-prof').value;
  const msgEl = document.getElementById('add-skill-msg');
  if (!skill_id) { msgEl.innerHTML = `<div class="alert alert-error">Please select a skill first.</div>`; return; }
  try {
    await api('/users/skills', { method: 'POST', body: JSON.stringify({ skill_id: parseInt(skill_id), proficiency }) });
    msgEl.innerHTML = `<div class="alert alert-success">✅ Skill added!</div>`;
    document.getElementById('skill-search').value = '';
    document.getElementById('selected-skill-id').value = '';
    setTimeout(() => loadProfileTab('skills'), 600);
  } catch (e) {
    msgEl.innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`;
  }
}

async function removeSkill(skillId) {
  try {
    await api(`/users/skills/${skillId}`, { method: 'DELETE' });
    loadProfileTab('skills');
  } catch(e) { alert(e.message); }
}

async function saveProfile() {
  const body = {
    education_level: document.getElementById('p-edu').value,
    years_experience: parseInt(document.getElementById('p-exp').value) || 0,
    field_of_study: document.getElementById('p-field').value,
    location: document.getElementById('p-location').value,
    linkedin_url: document.getElementById('p-linkedin').value,
    bio: document.getElementById('p-bio').value,
  };
  try {
    await api('/users/profile', { method: 'PUT', body: JSON.stringify(body) });
    document.getElementById('profile-msg').innerHTML = `<div class="alert alert-success">✅ Profile saved!</div>`;
  } catch(e) {
    document.getElementById('profile-msg').innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`;
  }
}

async function uploadResume() {
  const file = document.getElementById('resume-file').files[0];
  if (!file) return;
  const msgEl = document.getElementById('upload-msg');
  msgEl.innerHTML = `<div class="alert alert-info">⏳ Uploading and extracting skills...</div>`;
  try {
    const form = new FormData();
    form.append('file', file);
    const data = await apiForm('/upload/resume', form);
    document.getElementById('upload-results').innerHTML = `
      <div class="alert alert-success">${data.message}</div>
      ${data.added_skills.length ? `
        <div class="card" style="margin-top:14px">
          <div class="card-title">Extracted Skills (${data.extracted_skills.length})</div>
          <div>${data.extracted_skills.map(s => `<span class="pill pill-blue">${s}</span>`).join('')}</div>
          <div class="divider"></div>
          <div class="text-muted text-sm">✅ ${data.added_skills.length} new skills added to your profile</div>
        </div>` : ''}`;
    msgEl.innerHTML = '';
  } catch(e) {
    msgEl.innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`;
  }
}

// Jobs page
let allJobsCache = [];
function filterJobs() {
  const q = document.getElementById('job-search').value.toLowerCase();
  const type = document.getElementById('job-type-filter').value;
  let filtered = allJobsCache;
  if (q) filtered = filtered.filter(j => j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q));
  if (type) filtered = filtered.filter(j => j.job_type === type);
  renderJobsList(filtered);
}

function renderJobsList(jobs) {
  const container = document.getElementById('jobs-container');
  if (!jobs.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No jobs found matching your filters.</p></div>`;
    return;
  }
  container.innerHTML = jobs.map(job => {
    const skills = job.job_skills.map(js => js.skill.name);
    return `
      <div class="job-card" onclick="${state.token ? `openJobModal(${job.id})` : `navigate('login')`}">
        <div class="job-card-header">
          <div>
            <div class="job-title">${job.title}</div>
            <div class="job-meta">
              <span>🏢 ${job.company}</span>
              ${job.location ? `<span>📍 ${job.location}</span>` : ''}
              <span>💰 ${formatSalary(job.salary_min, job.salary_max)}</span>
              <span class="job-type-badge type-${job.job_type}">${jobTypeLabel(job.job_type)}</span>
            </div>
          </div>
        </div>
        <div style="margin-top:12px">
          ${skills.slice(0, 6).map(s => `<span class="pill pill-blue">${s}</span>`).join('')}
          ${skills.length > 6 ? `<span class="pill pill-gray">+${skills.length - 6} more</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ─── Tab switching ─────────────────────────────────────────────────────────────
let currentTab = 'skills';
async function switchTab(tab) {
  currentTab = tab;
  ['skills','info','resume'].forEach(t => document.getElementById(`tab-${t}`)?.classList.toggle('active', t === tab));
  await loadProfileTab(tab);
}

async function loadProfileTab(tab) {
  const container = document.getElementById('tab-content');
  container.innerHTML = `<div class="loading-center"><div class="spinner"></div></div>`;
  try {
    if (tab === 'skills') {
      const [user, allSkills] = await Promise.all([api('/users/me'), loadAllSkills()]);
      container.innerHTML = SkillsTab(user.user_skills, allSkills);
    } else if (tab === 'info') {
      const user = await api('/users/me');
      container.innerHTML = InfoTab(user.profile);
    } else {
      container.innerHTML = ResumeTab();
    }
  } catch(e) {
    container.innerHTML = `<div class="alert alert-error">Error: ${e.message}</div>`;
  }
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
async function render() {
  const app = document.getElementById('root');
  const requireAuth = ['dashboard','profile'].includes(state.page);
  if (requireAuth && !state.token) { navigate('login'); return; }

  let content = '';
  if      (state.page === 'home')      content = HomePage();
  else if (state.page === 'login')     content = LoginPage();
  else if (state.page === 'register')  content = RegisterPage();
  else if (state.page === 'dashboard') content = DashboardPage();
  else if (state.page === 'profile')   content = ProfilePage();
  else if (state.page === 'jobs')      content = JobsPage();

  app.innerHTML = Nav() + content;

  // Post-render actions
  if (state.page === 'dashboard') {
    try {
      const data = await api('/recommend/me');
      renderRecommendations(data);
    } catch(e) {
      document.getElementById('rec-container').innerHTML = `<div class="alert alert-error">Could not load recommendations: ${e.message}</div>`;
    }
  }

  if (state.page === 'profile') {
    await loadAllSkills();
    await loadProfileTab('skills');
  }

  if (state.page === 'jobs') {
    try {
      allJobsCache = await api('/jobs');
      renderJobsList(allJobsCache);
    } catch(e) {
      document.getElementById('jobs-container').innerHTML = `<div class="alert alert-error">Could not load jobs: ${e.message}</div>`;
    }
  }

  // Keyboard shortcut for login/register
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && state.page === 'login') doLogin();
    if (e.key === 'Enter' && state.page === 'register') doRegister();
  }, { once: true });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
